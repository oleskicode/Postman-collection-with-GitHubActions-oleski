- name: Install Newman and Reporter
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run Tests with HTML Report
        run: |
          newman run tests/collection.json -e tests/environment.json -r cli,htmlextra --reporter-htmlextra-export results/report.html

      # Uploads the report as an artifact you can download right from the GitHub Actions run page
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always() # Ensures the report uploads even if tests fail!
        with:
          name: postman-html-report
          path: results/report.html