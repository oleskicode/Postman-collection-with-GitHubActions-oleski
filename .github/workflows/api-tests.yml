name: API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  run-collection:
    name: Run Postman collection with Newman
    runs-on: ubuntu-latest
    permissions:
      pages: write
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman and htmlextra reporter
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run Postman collection
        run: |
          mkdir -p results
          newman run postman/ConduitCollection.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export results/report.html \
            -e postman/ConduitEnv.postman_environment.json \
            --env-var API_BASE_URL="${API_BASE_URL}" \
            --env-var USER_EMAIL="${USER_EMAIL}" \
            --env-var USER_NAME="${USER_NAME}" \
            --env-var USER_PASSWORD="${USER_PASSWORD}"
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000' }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_NAME: ${{ secrets.USER_NAME }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-report
          path: results/report.html

      - name: Prepare GitHub Pages content
        run: |
          cp results/report.html results/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: results

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
